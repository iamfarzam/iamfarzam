[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "gcc"]

[phases.install]
cmds = ["cd backend && python3 -m pip install -r requirements.txt"]

[phases.build]
cmds = ["cd backend && python3 manage.py collectstatic --noinput"]

[start]
cmd = "cd backend && python3 manage.py migrate --noinput && python3 -m gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3"
